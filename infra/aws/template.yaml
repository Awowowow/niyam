AWSTemplateFormatVersion: "2010-09-09"
Description: Production ECS Fargate deployment for Niyam Policy CI

Parameters:
  ApiImage:
    Type: String
    Description: Immutable ECR image URI for apps/api/Dockerfile
  WebImage:
    Type: String
    Description: Immutable ECR image URI for apps/web/Dockerfile
  VerificationImage:
    Type: String
    Description: Immutable ECR image URI for apps/verification/Dockerfile
  EvidencePrivateKeySecretArn:
    Type: String
    Description: Secrets Manager ARN containing the base64-encoded Ed25519 private key
  OriginVerifySecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Random value CloudFront sends to the ALB to prevent direct origin access
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 2
    Description: Number of Niyam Fargate tasks

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.24.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.24.1.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.24.2.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-b"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow CloudFront to reach the Niyam ALB
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb"

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow only the Niyam ALB to reach the web container
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-task"

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: "false"
        - Key: idle_timeout.timeout_seconds
          Value: "180"
      Tags:
        - Key: Project
          Value: Niyam

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 20
      HealthCheckPath: /
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: "200-399"
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref Vpc
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      Tags:
        - Key: Project
          Value: Niyam

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: text/plain
            MessageBody: Forbidden
            StatusCode: "403"
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP

  OriginForwardRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Niyam-Origin-Verify
            Values:
              - !Ref OriginVerifySecret
      ListenerArn: !Ref HttpListener
      Priority: 1

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      Tags:
        - Key: Project
          Value: Niyam

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-execution-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadEvidenceSigningKey
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref EvidencePrivateKeySecretArn
      Tags:
        - Key: Project
          Value: Niyam

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-task-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockMantleInferenceAccess
      Tags:
        - Key: Project
          Value: Niyam

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}"
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: Niyam

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref AWS::StackName
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: verification
          Image: !Ref VerificationImage
          Essential: true
          Cpu: 256
          MemoryReservation: 384
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          HealthCheck:
            Command:
              - CMD-SHELL
              - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)" || exit 1
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: verification

        - Name: api
          Image: !Ref ApiImage
          Essential: true
          Cpu: 1024
          MemoryReservation: 1536
          DependsOn:
            - ContainerName: verification
              Condition: HEALTHY
          PortMappings:
            - ContainerPort: 4000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "4000"
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: NIYAM_SOLVER_URL
              Value: http://127.0.0.1:8000
            - Name: NIYAM_ENABLE_CODEX_REPAIRS
              Value: "true"
            - Name: NIYAM_ENABLE_AI_EXTRACTION
              Value: "true"
            - Name: NIYAM_JUDGE_MODE
              Value: "true"
            - Name: NIYAM_AI_BACKEND
              Value: bedrock-chat
            - Name: NIYAM_POLICY_MODEL
              Value: openai.gpt-oss-120b
            - Name: NIYAM_REPAIR_MODEL
              Value: qwen.qwen3-coder-480b-a35b-instruct
          Secrets:
            - Name: NIYAM_EVIDENCE_PRIVATE_KEY_BASE64
              ValueFrom: !Ref EvidencePrivateKeySecretArn
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget -q -O - http://127.0.0.1:4000/api/health >/dev/null || exit 1
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

        - Name: web
          Image: !Ref WebImage
          Essential: true
          Cpu: 512
          MemoryReservation: 768
          DependsOn:
            - ContainerName: api
              Condition: HEALTHY
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: HOSTNAME
              Value: 0.0.0.0
            - Name: NIYAM_API_URL
              Value: http://127.0.0.1:4000/api
          HealthCheck:
            Command:
              - CMD-SHELL
              - node -e "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web
      Tags:
        - Key: Project
          Value: Niyam

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - OriginForwardRule
    Properties:
      ServiceName: !Sub "${AWS::StackName}-service"
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      HealthCheckGracePeriodSeconds: 180
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref TaskSecurityGroup
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !Ref WebTargetGroup
      PropagateTags: SERVICE
      Tags:
        - Key: Project
          Value: Niyam

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: Niyam Policy CI production edge
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: niyam-alb
            DomainName: !GetAtt LoadBalancer.DNSName
            ConnectionAttempts: 3
            ConnectionTimeout: 10
            OriginCustomHeaders:
              - HeaderName: X-Niyam-Origin-Verify
                HeaderValue: !Ref OriginVerifySecret
            CustomOriginConfig:
              HTTPPort: 80
              OriginKeepaliveTimeout: 5
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: niyam-alb
          AllowedMethods:
            - DELETE
            - GET
            - HEAD
            - OPTIONS
            - PATCH
            - POST
            - PUT
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          Compress: true
          ViewerProtocolPolicy: redirect-to-https
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Project
          Value: Niyam

Outputs:
  PublicUrl:
    Description: Public HTTPS judge URL
    Value: !Sub "https://${Distribution.DomainName}"
  DistributionId:
    Value: !Ref Distribution
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !GetAtt Service.Name
  ProtectedOrigin:
    Description: Direct ALB requests intentionally return 403 without the CloudFront origin header
    Value: !Sub "http://${LoadBalancer.DNSName}"
