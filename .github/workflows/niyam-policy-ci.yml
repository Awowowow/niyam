name: Niyam Policy Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: niyam-policy-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify policy, code, and evidence contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/verification/requirements.txt

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install verification dependencies
        run: python -m pip install -r apps/verification/requirements.txt pytest httpx

      - name: Run the complete policy guard
        run: pnpm check
